<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <link rel="stylesheet" href="css/leaflet-measure.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
         <title>Convenio Resolución Mixta</title>
        <!-- Icono -->
        <link rel="icon" href="./images/favicon1.ico">
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/multi-style-layer.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-measure.js"></script>
        <script src="data/LimiteGC_1.js"></script>
        <script src="data/Area2_2.js"></script>
        <script src="data/Casos_3.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[-32.99069219081135,-68.94079580597881],[-32.86721026075926,-68.71951249670738]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_OpenStreetMap_0');
        map.getPane('pane_OpenStreetMap_0').style.zIndex = 400;
        var layer_OpenStreetMap_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OpenStreetMap_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OpenStreetMap_0;
        map.addLayer(layer_OpenStreetMap_0);
        function pop_LimiteGC_1(feature, layer) {
            var popupContent = '<table>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_LimiteGC_1_0() {
            return {
                pane: 'pane_LimiteGC_1',
                opacity: 1,
                color: 'rgba(0,0,0,1.0)',
                dashArray: '',
                lineCap: 'square',
                lineJoin: 'bevel',
                weight: 2.0,
                fillOpacity: 0,
                interactive: true,
            }
        }
        map.createPane('pane_LimiteGC_1');
        map.getPane('pane_LimiteGC_1').style.zIndex = 401;
        map.getPane('pane_LimiteGC_1').style['mix-blend-mode'] = 'normal';
        var layer_LimiteGC_1 = new L.geoJson(json_LimiteGC_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_LimiteGC_1',
            layerName: 'layer_LimiteGC_1',
            pane: 'pane_LimiteGC_1',
            onEachFeature: pop_LimiteGC_1,
            style: style_LimiteGC_1_0,
        });
        bounds_group.addLayer(layer_LimiteGC_1);
        map.addLayer(layer_LimiteGC_1);
        function pop_Area2_2(feature, layer) {
            var popupContent = '<table>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        var pattern_Area2_2_0 = new L.StripePattern({
            weight: 0.8,
            spaceWeight: 2.8,
            color: '#ba6c1d',
            opacity: 1.0,
            spaceOpacity: 0,
            angle: 225
        });
        pattern_Area2_2_0.addTo(map);
        function style_Area2_2_0() {
            return {
                pane: 'pane_Area2_2',
                stroke: false,
                fillOpacity: 1,
                fillPattern: pattern_Area2_2_0,
                interactive: false,
            }
        }
        function style_Area2_2_1() {
            return {
                pane: 'pane_Area2_2',
                opacity: 1,
                color: 'rgba(186,108,29,1.0)',
                dashArray: '',
                lineCap: 'square',
                lineJoin: 'bevel',
                weight: 3.0,
                fillOpacity: 0,
                interactive: false,
            }
        }
        map.createPane('pane_Area2_2');
        map.getPane('pane_Area2_2').style.zIndex = 402;
        map.getPane('pane_Area2_2').style['mix-blend-mode'] = 'normal';
        var layer_Area2_2 = new L.geoJson.multiStyle(json_Area2_2, {
            attribution: '',
            interactive: false,
            dataVar: 'json_Area2_2',
            layerName: 'layer_Area2_2',
            pane: 'pane_Area2_2',
            onEachFeature: pop_Area2_2,
            styles: [style_Area2_2_0,style_Area2_2_1,]
        });
        bounds_group.addLayer(layer_Area2_2);
        map.addLayer(layer_Area2_2);
        function pop_Casos_3(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td class="visible-with-data" id="TICKET" colspan="2"><strong>TICKET</strong><br />' + (feature.properties['TICKET'] !== null ? autolinker.link(String(feature.properties['TICKET']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td class="visible-with-data" id="DESCRIPCION" colspan="2"><strong>DESCRIPCION</strong><br />' + (feature.properties['DESCRIPCION'] !== null ? autolinker.link(String(feature.properties['DESCRIPCION']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td class="visible-with-data" id="DOMICILIO" colspan="2"><strong>DOMICILIO</strong><br />' + (feature.properties['DOMICILIO'] !== null ? autolinker.link(String(feature.properties['DOMICILIO']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Casos_3_0() {
            return {
                pane: 'pane_Casos_3',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(112,143,203,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_Casos_3');
        map.getPane('pane_Casos_3').style.zIndex = 403;
        map.getPane('pane_Casos_3').style['mix-blend-mode'] = 'normal';
        var layer_Casos_3 = new L.geoJson(json_Casos_3, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Casos_3',
            layerName: 'layer_Casos_3',
            pane: 'pane_Casos_3',
            onEachFeature: pop_Casos_3,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_Casos_3_0(feature));
            },
        });
        bounds_group.addLayer(layer_Casos_3);
        map.addLayer(layer_Casos_3);
        var overlaysTree = [
            {label: '<img src="legend/Casos_3.png" /> Casos', layer: layer_Casos_3},
            {label: '<img src="legend/Area2_2.png" /> Area 2', layer: layer_Area2_2},
            {label: '<img src="legend/LimiteGC_1.png" /> Limite GC', layer: layer_LimiteGC_1},
            {label: "OpenStreetMap", layer: layer_OpenStreetMap_0},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        </script>        
    </body>
</html>
